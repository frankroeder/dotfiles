general {
  lock_cmd = pidof hyprlock || hyprlock --config ~/.config/hypr/hyprlock.conf
  before_sleep_cmd = sh -c "~/.dotfiles/asahi/bin/asahi-idle-brightness off; loginctl lock-session"
  after_sleep_cmd = sh -c "hyprctl dispatch dpms on; ~/.dotfiles/asahi/bin/asahi-idle-brightness restore"
}

listener {
  timeout = 240
  on-timeout = ~/.dotfiles/asahi/bin/asahi-idle-brightness dim
  on-resume = ~/.dotfiles/asahi/bin/asahi-idle-brightness restore
}

listener {
  timeout = 300
  on-timeout = loginctl lock-session
  on-resume = ~/.dotfiles/asahi/bin/asahi-idle-brightness restore
}

listener {
  timeout = 420
  on-timeout = sh -c "~/.dotfiles/asahi/bin/asahi-idle-brightness off; hyprctl dispatch dpms off"
  on-resume = sh -c "hyprctl dispatch dpms on; ~/.dotfiles/asahi/bin/asahi-idle-brightness restore"
}

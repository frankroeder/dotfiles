general {
  lock_cmd = pidof hyprlock || hyprlock --config ~/.config/hypr/hyprlock.conf
  # Quiesce DCP before Asahi s2idle.
  before_sleep_cmd = ~/.dotfiles/asahi/bin/asahi-idle-brightness off; hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'; loginctl lock-session
  after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'; ~/.dotfiles/asahi/bin/asahi-idle-brightness restore
}

listener {
  timeout = 120
  on-timeout = ~/.dotfiles/asahi/bin/asahi-idle-brightness dim
  on-resume = ~/.dotfiles/asahi/bin/asahi-idle-brightness restore
}

listener {
  timeout = 180
  on-timeout = ~/.dotfiles/asahi/bin/asahi-screensaver start
  on-resume = ~/.dotfiles/asahi/bin/asahi-screensaver stop
}

listener {
  timeout = 600
  on-timeout = ~/.dotfiles/asahi/bin/asahi-screensaver stop; loginctl lock-session
}

listener {
  timeout = 900
  on-timeout = ~/.dotfiles/asahi/bin/asahi-idle-brightness off; hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
  on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'; ~/.dotfiles/asahi/bin/asahi-idle-brightness restore
}

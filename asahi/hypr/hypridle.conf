general {
  lock_cmd = pidof hyprlock || ~/.dotfiles/asahi/bin/asahi-hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
  timeout = 240
  on-timeout = brightnessctl -s set 10%
  on-resume = sh -c "brightnessctl -r 2>/dev/null || true"
}

listener {
  timeout = 300
  on-timeout = loginctl lock-session
  on-resume = sh -c "brightnessctl -r 2>/dev/null || true"
}

listener {
  timeout = 420
  on-timeout = hyprctl dispatch dpms off
  on-resume = sh -c "brightnessctl -r 2>/dev/null || true; hyprctl dispatch dpms on"
}

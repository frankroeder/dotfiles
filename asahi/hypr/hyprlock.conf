$font = Cascadia Mono NF

general {
  hide_cursor = true
  ignore_empty_input = true
  immediate_render = true
}

auth {
  pam:enabled = true
}

animations {
  enabled = true
  bezier = linear, 1, 1, 0, 0
  animation = fadeIn, 1, 5, linear
  animation = fadeOut, 1, 5, linear
  animation = inputFieldDots, 1, 2, linear
}

background {
  monitor =
  path = ~/Pictures/wallpaper/blackhole.jpg
  color = rgb(1e1e2e)
}

label {
  monitor =
  text = $TIME
  color = rgb(f5c2e7)
  font_size = 84
  font_family = $font
  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(11111bcc)
  position = 0, 125
  halign = center
  valign = center
  zindex = 1
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B %Y"
  color = rgb(7f849c)
  font_size = 24
  font_family = $font
  position = 0, 60
  halign = center
  valign = center
  zindex = 1
}

input-field {
  monitor =
  size = 22%, 5%
  outline_thickness = 4
  inner_color = rgba(0, 0, 0, 0.0)
  outer_color = rgba(f5c2e7ee) rgba(cba6f7ee) 45deg
  check_color = rgba(a6e3a1ee) rgba(94e2d5ee) 120deg
  fail_color = rgba(f38ba8ee) rgba(eb6f92ee) 40deg
  font_color = rgb(cdd6f4)
  font_family = $font
  fade_on_empty = false
  rounding = 15
  placeholder_text = Enter password...
  fail_text = $PAMFAIL
  dots_spacing = 0.3
  shadow_passes = 2
  shadow_size = 4
  shadow_color = rgba(11111bcc)
  position = 0, -45
  halign = center
  valign = center
  zindex = 1
}

label {
  monitor =
  text = Locked for $USER
  color = rgb(a6adc8)
  font_size = 16
  font_family = $font
  position = 0, -115
  halign = center
  valign = center
  zindex = 1
}

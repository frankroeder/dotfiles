input {
  kb_layout = de
  kb_variant = mac_nodeadkeys
  repeat_delay = 300
  repeat_rate = 40

  # flat = constant 1:1 speed regardless of movement speed (good for muscle memory)
  # adaptive (default) = slow movements decelerate for precision, fast movements accelerate up to 3.5x
  accel_profile = adaptive

  touchpad {
    natural_scroll = true
    tap-to-click = true
    disable_while_typing = true # prevent accidental touches
    clickfinger_behavior = true # 2-finger = right-click, 3-finger = middle
    drag_lock = true # keep dragging after briefly lifting finger
  }
}

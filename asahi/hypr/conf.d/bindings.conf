# Apps and windows
gesture = 3, horizontal, workspace

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Space, exec, $launcher
bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, exec, ~/.dotfiles/asahi/bin/hypr-killactive
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod SHIFT, T, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, R, layoutmsg, togglesplit
bind = $mainMod, W, togglegroup
bind = $mainMod, M, exec, ~/.dotfiles/asahi/bin/asahi-feature-menu
bind = $mainMod, N, exec, ~/.dotfiles/asahi/bin/asahi-network-menu
bind = $mainMod, S, togglespecialworkspace, scratch
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:scratch
bind = $mainMod ALT, Return, exec, ~/.dotfiles/asahi/bin/asahi-special-terminal

# Session and screenshots
# bind = $mainMod ALT, L, exec, hyprlock --config ~/.config/hypr/hyprlock.conf
bind = $mainMod, Escape, exec, hyprlock --config ~/.config/hypr/hyprlock.conf
bind = $mainMod SHIFT, Escape, exec, ~/.dotfiles/asahi/bin/asahi-control-menu
bind = $mainMod CTRL ALT, S, exec, sh -c "loginctl lock-session && systemctl suspend"
bind = $mainMod ALT CTRL, 2, exec, ~/.dotfiles/asahi/bin/asahi-cmd-screenshot smart
bind = $mainMod ALT CTRL, 3, exec, ~/.dotfiles/asahi/bin/asahi-cmd-screenshot fullscreen
bind = $mainMod ALT CTRL, 4, exec, ~/.dotfiles/asahi/bin/asahi-cmd-screenshot region

# Reloads
bind = $mainMod CTRL ALT, R, exec, ~/.dotfiles/asahi/bin/asahi-reload-hyprland
bind = $mainMod CTRL ALT, Space, exec, ~/.dotfiles/asahi/bin/asahi-restart-walker
bind = $mainMod CTRL ALT, W, exec, ~/.dotfiles/asahi/bin/asahi-restart-app waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
bind = $mainMod CTRL ALT, M, exec, ~/.dotfiles/asahi/bin/asahi-restart-app mako --config ~/.config/mako/config
bind = $mainMod CTRL ALT, P, exec, ~/.dotfiles/asahi/bin/asahi-restart-app hyprpaper
bind = $mainMod CTRL ALT, I, exec, ~/.dotfiles/asahi/bin/asahi-restart-app hypridle

# Focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Home, focuswindow, first
bind = $mainMod, End, focuswindow, last

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Monitors
bind = $mainMod CTRL, left, focusmonitor, l
bind = $mainMod CTRL, right, focusmonitor, r
bind = $mainMod CTRL, up, focusmonitor, u
bind = $mainMod CTRL, down, focusmonitor, d
bind = $mainMod SHIFT CTRL, H, movewindow, mon:l
bind = $mainMod SHIFT CTRL, L, movewindow, mon:r
bind = $mainMod SHIFT CTRL, K, movewindow, mon:u
bind = $mainMod SHIFT CTRL, J, movewindow, mon:d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, I, workspace, e-1
bind = $mainMod, U, workspace, e+1
bind = $mainMod, Page_Up, workspace, e-1
bind = $mainMod, Page_Down, workspace, e+1

# Move to workspace
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10
bind = $mainMod SHIFT, I, movetoworkspace, e-1
bind = $mainMod SHIFT, U, movetoworkspace, e+1
bind = $mainMod SHIFT, Page_Up, movetoworkspace, e-1
bind = $mainMod SHIFT, Page_Down, movetoworkspace, e+1

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, mouse_down, movetoworkspace, e+1
bind = $mainMod CTRL, mouse_up, movetoworkspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media
bindel = , XF86AudioRaiseVolume, exec, ~/.dotfiles/asahi/bin/asahi-media-control output-volume raise
bindel = , XF86AudioLowerVolume, exec, ~/.dotfiles/asahi/bin/asahi-media-control output-volume lower
bindl = , XF86AudioMute, exec, ~/.dotfiles/asahi/bin/asahi-media-control output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, ~/.dotfiles/asahi/bin/asahi-media-control input-volume mute-toggle
bindl = , XF86AudioPlay, exec, ~/.dotfiles/asahi/bin/asahi-media-control playerctl play-pause
bindl = , XF86AudioPause, exec, ~/.dotfiles/asahi/bin/asahi-media-control playerctl play-pause
bindl = , XF86AudioNext, exec, ~/.dotfiles/asahi/bin/asahi-media-control playerctl next
bindl = , XF86AudioPrev, exec, ~/.dotfiles/asahi/bin/asahi-media-control playerctl previous
bindl = , Caps_Lock, exec, sh -c 'sleep 0.08; ~/.dotfiles/asahi/bin/asahi-swayosd --caps-lock'

# Brightness
bindel = , XF86MonBrightnessUp, exec, ~/.dotfiles/asahi/bin/asahi-media-control brightness raise
bindel = , XF86MonBrightnessDown, exec, ~/.dotfiles/asahi/bin/asahi-media-control brightness lower
bindel = SHIFT , XF86MonBrightnessUp, exec, ~/.dotfiles/asahi/bin/asahi-media-control brightness +1
bindel = SHIFT , XF86MonBrightnessDown, exec, ~/.dotfiles/asahi/bin/asahi-media-control brightness -1
bindel = , XF86KbdBrightnessUp, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness raise
bindel = , XF86KbdBrightnessDown, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness lower
bindel = , F4, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness raise
bindel = , F3, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness lower
bindel = SHIFT, F4, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness +1
bindel = SHIFT, F3, exec, ~/.dotfiles/asahi/bin/asahi-media-control keyboard-brightness -1

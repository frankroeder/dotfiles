# Asahi Linux / Apple Silicon
vo=gpu-next
# Current Fedora Asahi has working Vulkan on Apple GPU; keep OpenGL as fallback.
gpu-api=vulkan,opengl
# Asahi video decode is still WIP, so avoid noisy failed hwdec probes.
hwdec=no

# Playback
profile=high-quality
keep-open=yes
save-position-on-quit=yes
hr-seek-framedrop=no
cache=yes
demuxer-max-bytes=100M
demuxer-max-back-bytes=50M
audio-stream-silence=yes
audio-file-auto=fuzzy
audio-pitch-correction=yes
volume-max=150

# Window
border=no
autofit=85%x85%
cursor-autohide=100
msg-color=yes
msg-module=yes

# Subtitles
sub-auto=fuzzy
sub-file-paths-append=ass
sub-file-paths-append=srt
sub-file-paths-append=sub
sub-file-paths-append=subs
sub-file-paths-append=subtitles
embeddedfonts=yes
demuxer-mkv-subtitle-preroll=yes
sub-fix-timing=no

# Language priority
alang=jpn,jp,eng,en,enUS,en-US,de,ger
slang=eng,en,und,de,ger,jp,jap

[protocol.http]
hls-bitrate=max
cache=yes
no-cache-pause

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http
